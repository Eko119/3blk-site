<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 88" width="120" height="88" role="img" aria-label="Velox">
  <title>Velox</title>
  <!-- Stacked lockup: mark centered above wordmark. Use on dark backgrounds. -->
  <!-- V mark centered on 120px canvas: mark center at x=24, shift right by 36 → translate(40,4) -->
  <g transform="translate(40,4)">
    <line x1="6" y1="4" x2="24" y2="44" stroke="#C2FF3D" stroke-width="4" stroke-linecap="square"/>
    <line x1="42" y1="4" x2="24" y2="44" stroke="#C2FF3D" stroke-width="5" stroke-linecap="square"/>
  </g>
  <!-- Wordmark centered: text-anchor middle at x=60, baseline y=82 -->
  <text x="60" y="82" text-anchor="middle" font-family="'Geist Sans', 'Geist', ui-sans-serif, system-ui, sans-serif" font-weight="700" font-size="22" fill="#FFFFFF" letter-spacing="-0.88">VELOX</text>
</svg>
