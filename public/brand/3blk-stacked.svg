<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 88" width="120" height="88" role="img" aria-label="3BLK">
  <title>3BLK</title>
  <!--
    Stacked lockup. III mark above 3BLK wordmark, both centered horizontally.
    Use for square contexts: social avatar, app icon background, stamp.
  -->
  <g transform="translate(36,4)">
    <line x1="8" y1="4" x2="8" y2="44" stroke="#C2FF3D" stroke-width="4" stroke-linecap="square"/>
    <line x1="24" y1="4" x2="24" y2="44" stroke="#C2FF3D" stroke-width="5" stroke-linecap="square"/>
    <line x1="40" y1="4" x2="40" y2="44" stroke="#C2FF3D" stroke-width="4" stroke-linecap="square"/>
  </g>
  <text x="60" y="82" text-anchor="middle" font-family="'Geist Sans', system-ui, sans-serif" font-weight="700" font-size="22" fill="#FFFFFF" letter-spacing="-0.88">3BLK</text>
</svg>
