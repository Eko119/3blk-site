<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 56" width="160" height="56" role="img" aria-label="Velox">
  <title>Velox</title>
  <!-- Use on dark backgrounds (#0A0A0A or equivalent). Transparent fill. -->
  <!-- V mark: asymmetric 4px/5px strokes, 48×48 grid, translate(4,4) -->
  <g transform="translate(4,4)">
    <line x1="6" y1="4" x2="24" y2="44" stroke="#C2FF3D" stroke-width="4" stroke-linecap="square"/>
    <line x1="42" y1="4" x2="24" y2="44" stroke="#C2FF3D" stroke-width="5" stroke-linecap="square"/>
  </g>
  <!-- Wordmark: Geist Sans 700, 28px, -0.04em tracking (-1.12px) -->
  <text x="67" y="40" font-family="'Geist Sans', 'Geist', ui-sans-serif, system-ui, sans-serif" font-weight="700" font-size="28" fill="#FFFFFF" letter-spacing="-1.12">VELOX</text>
</svg>
