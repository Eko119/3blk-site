<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 56" width="160" height="56" role="img" aria-label="Velox">
  <title>Velox</title>
  <!--
    Single-color version. All elements in one color.
    Use for: screen printing, embossing, foil stamp, laser engraving,
    single-color embroidery, fax, monochrome output.
    Swap fill/stroke color to match substrate (black on white, white on dark).
    This file: white (#FFFFFF) — use on dark substrate.
  -->
  <g transform="translate(4,4)">
    <line x1="6" y1="4" x2="24" y2="44" stroke="#FFFFFF" stroke-width="4" stroke-linecap="square"/>
    <line x1="42" y1="4" x2="24" y2="44" stroke="#FFFFFF" stroke-width="5" stroke-linecap="square"/>
  </g>
  <text x="67" y="40" font-family="'Geist Sans', 'Geist', ui-sans-serif, system-ui, sans-serif" font-weight="700" font-size="28" fill="#FFFFFF" letter-spacing="-1.12">VELOX</text>
</svg>
