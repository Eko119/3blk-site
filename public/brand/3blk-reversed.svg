<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 56" width="160" height="56" role="img" aria-label="3BLK">
  <title>3BLK</title>
  <!--
    Reversed lockup. III mark + 3BLK wordmark both in #111111
    for use on white or light surfaces (print, email, light contexts).
  -->
  <g transform="translate(4,4)">
    <line x1="8" y1="4" x2="8" y2="44" stroke="#111111" stroke-width="4" stroke-linecap="square"/>
    <line x1="24" y1="4" x2="24" y2="44" stroke="#111111" stroke-width="5" stroke-linecap="square"/>
    <line x1="40" y1="4" x2="40" y2="44" stroke="#111111" stroke-width="4" stroke-linecap="square"/>
  </g>
  <text x="67" y="40" font-family="'Geist Sans', system-ui, sans-serif" font-weight="700" font-size="28" fill="#111111" letter-spacing="-1.12">3BLK</text>
</svg>
