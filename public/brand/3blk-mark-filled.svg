<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" width="56" height="56" role="img" aria-label="3BLK mark">
  <title>3BLK mark</title>
  <!--
    Filled III mark (Variant 03). Three solid lime rectangles,
    center 2px wider. Primary use: favicon, app icon, social avatar,
    embroidery. Maximum legibility at minimum size. Solid form
    survives 16px. Use on #0A0A0A surface.
  -->
  <g transform="translate(4,4)">
    <rect x="4" y="4" width="8" height="40" fill="#C2FF3D"/>
    <rect x="19" y="4" width="10" height="40" fill="#C2FF3D"/>
    <rect x="36" y="4" width="8" height="40" fill="#C2FF3D"/>
  </g>
</svg>
